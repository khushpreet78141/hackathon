<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website Safety Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>Safety Analyzer</h1>
        <p class="domain-label" id="domainLabel">Analyzing...</p>
      </div>
    </header>

    <!-- Loading State -->
    <div class="loading-state" id="loadingState">
      <div class="scanner">
        <div class="scanner-line"></div>
        <div class="scanner-grid">
          <div class="grid-dot"></div><div class="grid-dot"></div><div class="grid-dot"></div>
          <div class="grid-dot"></div><div class="grid-dot"></div><div class="grid-dot"></div>
          <div class="grid-dot"></div><div class="grid-dot"></div><div class="grid-dot"></div>
        </div>
      </div>
      <p class="loading-text" id="loadingText">Scanning website...</p>
      <div class="loading-steps">
        <div class="step active" id="step1">
          <span class="step-dot"></span>Extracting page data
        </div>
        <div class="step" id="step2">
          <span class="step-dot"></span>Analyzing with AI
        </div>
        <div class="step" id="step3">
          <span class="step-dot"></span>Generating report
        </div>
      </div>
    </div>

    <!-- Error State -->
    <div class="error-state hidden" id="errorState">
      <div class="error-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
      </div>
      <h2>Analysis Failed</h2>
      <p id="errorMessage">Something went wrong.</p>
      <button class="retry-btn" id="retryBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Retry Analysis
      </button>
    </div>

    <!-- Results State -->
    <div class="results-state hidden" id="resultsState">
      <!-- Risk Score -->
      <div class="risk-card" id="riskCard">
        <div class="risk-gauge-wrapper">
          <div class="risk-gauge" id="riskGauge">
            <svg viewBox="0 0 120 120" class="gauge-svg">
              <circle cx="60" cy="60" r="52" class="gauge-bg" />
              <circle cx="60" cy="60" r="52" class="gauge-fill" id="gaugeFill" />
            </svg>
            <div class="gauge-center">
              <span class="risk-score" id="riskScoreValue">0</span>
              <span class="risk-label" id="riskLevelLabel">SAFE</span>
            </div>
          </div>
        </div>
        <p class="risk-summary" id="riskSummary">Loading summary...</p>
      </div>

      <!-- Categories -->
      <div class="categories" id="categoriesContainer"></div>

      <!-- Findings -->
      <div class="findings-section">
        <h3 class="section-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          Key Findings
        </h3>
        <div class="findings-list" id="findingsList"></div>
      </div>

      <!-- Recommendations -->
      <div class="recommendations-section">
        <h3 class="section-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="16" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
          Recommendations
        </h3>
        <ul class="recommendations-list" id="recommendationsList"></ul>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span>Powered by Gemini AI</span>
      <span class="footer-dot">·</span>
      <span>Website Safety Analyzer v1.0</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
